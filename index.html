<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mood Explore Tarif</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: #1c1c1c;
      padding: 20px;
      border-radius: 15px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      border: none;
      border-radius: 10px;
      background: #25D366;
      color: white;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .result {
      margin-top: 20px;
      background: #2b2b2b;
      padding: 15px;
      border-radius: 10px;
      line-height: 1.8;
      font-size: 15px;
    }
  </style>
</head>
<body>

<div class="container">

  <h2>Mood Explore</h2>

  <input type="text" id="from" placeholder="Lokasi Penjemputan">

  <input type="text" id="to" placeholder="Lokasi Pengantaran">

  <button onclick="calculateRoute()">
    Hitung Tarif
  </button>

  <div class="result" id="result"></div>

</div>

<script>

const tarifDasar = 50000;
const tarifPerKm = 6000;
const tarifPerMenit = 1300;

function initAutocomplete() {

  const fromInput = document.getElementById('from');
  const toInput = document.getElementById('to');

  new google.maps.places.Autocomplete(fromInput);
  new google.maps.places.Autocomplete(toInput);
}

async function calculateRoute() {

  const from = document.getElementById('from').value;
  const to = document.getElementById('to').value;

  const response = await fetch(
    'https://routes.googleapis.com/directions/v2:computeRoutes',
    {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Goog-Api-Key': 'MASUKKAN_API_KEY_ANDA',
        'X-Goog-FieldMask': 'routes.distanceMeters,routes.duration,routes.travelAdvisory.tollInfo'
      },
      body: JSON.stringify({
        origin: {
          address: from
        },
        destination: {
          address: to
        },
        travelMode: 'DRIVE',
        routingPreference: 'TRAFFIC_AWARE',
        extraComputations: ['TOLLS']
      })
    }
  );

  const data = await response.json();

  const route = data.routes[0];

  const km = route.distanceMeters / 1000;

  const minutes = parseInt(route.duration) / 60;

  let toll = 0;

  if (
    route.travelAdvisory &&
    route.travelAdvisory.tollInfo &&
    route.travelAdvisory.tollInfo.estimatedPrice
  ) {
    toll = route.travelAdvisory.tollInfo.estimatedPrice[0].units || 0;
  }

  const total =
    tarifDasar +
    (km * tarifPerKm) +
    (minutes * tarifPerMenit) +
    parseInt(toll);

  document.getElementById('result').innerHTML = `

    <b>Estimasi:</b><br>
    Jarak: ${km.toFixed(1)} KM<br>
    Waktu: ${minutes.toFixed(0)} menit<br>
    Tol: Rp ${parseInt(toll).toLocaleString('id-ID')}<br><br>

    <b>Rumus:</b><br>
    ${tarifDasar.toLocaleString('id-ID')}<br>
    + (${km.toFixed(1)} × ${tarifPerKm.toLocaleString('id-ID')})<br>
    + (${minutes.toFixed(0)} × ${tarifPerMenit.toLocaleString('id-ID')})<br>
    + ${parseInt(toll).toLocaleString('id-ID')}<br><br>

    <b>Total:</b><br>
    Rp ${Math.round(total).toLocaleString('id-ID')}

  `;
}

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=MASUKKAN_API_KEY_ANDA&libraries=places&callback=initAutocomplete">
</script>

</body>
</html>
